<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Song Game</title>
    <meta name="description" content="How fast can you guess popular songs just by hearing the music?">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Warning Badge -->
    <div class="beta-warning">
        🚧 Not fully released yet, various bugs or errors may occur. Have a good game!
    </div>

    <!-- Category Sidebar moved inside app-container -->
    <div class="app-container">
        <!-- Category Sidebar -->
        <div id="categorySidebar" class="category-sidebar">
            <div class="sidebar-header">
                <h3>Music Categories</h3>
                <button id="closeSidebarBtn" class="close-btn">✖</button>
            </div>
            <div class="category-list">
                <button class="cat-btn active" data-val="rastgele">🎲 Random</button>
                <button class="cat-btn" data-val="global_pop">🌍 Global Pop</button>
                <button class="cat-btn" data-val="yabanci_2000ler">💿 2000s Global Hits</button>
                <button class="cat-btn" data-val="yabanci_90lar">🪩 90s Global Hits</button>
                <button class="cat-btn" data-val="yabanci_80ler">🕺 80s Nostalgia</button>
                <button class="cat-btn" data-val="global_rock">🎸 Global Rock</button>
                <button class="cat-btn" data-val="punk_rock">🛹 Punk Rock</button>
                <button class="cat-btn" data-val="global_metal">🤘 Global Metal</button>
                <button class="cat-btn" data-val="nu_metal">⛓️ Nu Metal</button>
                <button class="cat-btn" data-val="global_rap">🎤 Global Rap</button>
                <button class="cat-btn" data-val="film">🎬 Movie OSTs</button>
                <button class="cat-btn" data-val="oyun">🎮 Video Game OSTs</button>
            </div>
        </div>
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- Right Tab Button -->
        <button id="modeToggleTab" class="side-tab-btn right-tab" title="Game Modes">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        </button>

        <!-- Right Mode Sidebar -->
        <div id="modeSidebar" class="category-sidebar mode-sidebar">
            <div class="sidebar-header">
                <h3>Game Modes</h3>
                <button id="closeModeSidebarBtn" class="close-btn">✖</button>
            </div>
            <div class="category-list">
                <button class="cat-btn active" data-mode="song">🎧 Guess The Song</button>
                <button class="cat-btn" data-mode="movie">🎬 Movie Frames</button>
                <button class="cat-btn disabled" disabled title="Coming Soon!">💬 Movie Quotes (Soon)</button>
                <button class="cat-btn disabled" disabled title="Coming Soon!">👾 Pixel Art (Soon)</button>
            </div>
        </div>

        <!-- Header: Score and Mode -->
        <header class="game-header glass-panel">
            <div class="score-container">
                <span class="label">Endless Score</span>
                <span class="value" id="scoreValue">0</span>
            </div>
            
            <div class="category-container">
                <button id="categoryToggleBtn" class="category-toggle">
                    <span>🎲 Random</span> 
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>

            <div class="header-actions">
                <a href="index.html" class="lang-btn" title="Switch to Turkish">🇹🇷 TR</a>
                <div class="mode-badge">
                    <span class="pulse-dot"></span> Live
                </div>
            </div>
        </header>

        <!-- Main Gameplay Area -->
        <main class="game-main glass-panel">
            <div class="hint-box">
                <img id="btnCover" class="btn-cover" src="" alt="Album Hint">
            </div>
            <div class="visualizer-container" id="visualizerContainer">
                <div class="pulse-ring" id="pulseRing"></div>
                <button class="play-btn" id="playBtn" disabled>
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
            </div>

            <!-- Movie Frame Container (Hidden by default) -->
            <div class="frame-container" id="frameContainer" style="display: none;">
                <img id="movieFrame" class="movie-backdrop" src="" alt="Movie Scene">
            </div>

            <!-- Movie Hints (Hidden by default) -->
            <div class="hints-grid" id="hintsGrid">
                <div class="hint-card locked" id="hintYear">
                    <span class="label">Year / Genre</span>
                    <span class="value">?</span>
                </div>
                <div class="hint-card locked" id="hintCast">
                    <span class="label">Cast</span>
                    <span class="value">?</span>
                </div>
                <div class="hint-card locked" id="hintOverview">
                    <span class="label">Overview</span>
                    <span class="value">?</span>
                </div>
            </div>
            
            <div class="controls-row">
                <div class="volume-container" id="volumeContainer">
                    <svg viewBox="0 0 24 24" class="vol-icon" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
                </div>

                <div class="lives-container" id="livesContainer">
                    <svg viewBox="0 0 24 24" class="heart" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg viewBox="0 0 24 24" class="heart" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg viewBox="0 0 24 24" class="heart" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg viewBox="0 0 24 24" class="heart" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                
                <button class="hint-btn" id="hintBtn" disabled title="Get Hint">
                    💡 Hint
                </button>
                <button class="skip-btn" id="skipBtn" disabled>
                    Skip <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="status-msg" id="statusMsg">Loading song...</p>
            <p class="track-stats" id="trackStats" style="display: none;"></p>
        </main>

        <!-- Search / Autocomplete Area -->
        <section class="search-section glass-panel">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Type a song or artist..." autocomplete="off" disabled>
                <div class="autocomplete-dropdown" id="autocompleteDropdown">
                    <!-- Search results will appear here -->
                </div>
            </div>
        </section>
        
        <div class="modal-overlay" id="feedbackModal">
            <div class="modal glass-panel" id="feedbackPanel">
                <h2 id="feedbackTitle">Correct!</h2>
                <div class="song-info" id="feedbackSongInfo">
                    <img id="feedbackCover" src="" alt="Album Cover">
                    <div class="song-details">
                        <strong id="feedbackTrack">Song Name</strong>
                        <span id="feedbackArtist">Artist</span>
                    </div>
                </div>
                <p class="auto-next-msg">🎶 Next question starting in 3 seconds...</p>
            </div>
        </div>

    <!-- Audio Element -->
    <audio id="audioPlayer" preload="auto"></audio>

    <script src="app-en.js"></script>
</body>
</html>
